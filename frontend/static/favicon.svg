<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <mask id="nib-cutout">
      <rect x="-50" y="-20" width="100" height="150" fill="white" />
      <circle cx="0" cy="35" r="5" fill="black" />
      <rect x="-1.5" y="35" width="3" height="70" fill="black" />
    </mask>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect fill="url(#bg-gradient)" width="100" height="100" rx="20"/>
  <g transform="translate(50, 55) scale(0.35) rotate(-40)" filter="url(#shadow)">
    <path d="M -30 -170 
              A 30 30 0 0 1 30 -170 
              L 22 -10 
              L -22 -10 Z" 
          fill="white" />
    <path d="M -20 0 
              L 20 0 
              L 28 35 
              L 0 100 
              L -28 35 Z" 
          fill="white"
          mask="url(#nib-cutout)" />
  </g>
</svg>
