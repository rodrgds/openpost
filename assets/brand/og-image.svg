<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827" />
      <stop offset="1" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="accent" x1="186" y1="106" x2="738" y2="476" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316" />
      <stop offset="1" stop-color="#fb923c" />
    </linearGradient>
    <mask id="nib-cutout">
      <rect x="-50" y="-20" width="100" height="150" fill="white" />
      <circle cx="0" cy="35" r="5" fill="black" />
      <rect x="-1.5" y="35" width="3" height="70" fill="black" />
    </mask>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" rx="36" />
  <circle cx="200" cy="130" r="160" fill="#f97316" fill-opacity=".15" />
  <circle cx="1080" cy="510" r="210" fill="#fb923c" fill-opacity=".08" />

  <rect x="88" y="88" width="1024" height="454" rx="32" fill="#0b1220" stroke="#374151" />

  <g transform="translate(230 322) scale(1.3) rotate(-40)">
    <path d="M -30 -170
             A 30 30 0 0 1 30 -170
             L 22 -10
             L -22 -10 Z"
          fill="url(#accent)" />
    <path d="M -20 0
             L 20 0
             L 28 35
             L 0 100
             L -28 35 Z"
          fill="url(#accent)"
          mask="url(#nib-cutout)" />
  </g>

  <path d="M 440 385
           C 465 402, 488 296, 520 296
           C 552 296, 570 378, 599 378
           C 628 378, 673 188, 720 188
           C 767 188, 798 404, 846 404
           C 894 404, 910 204, 958 204"
