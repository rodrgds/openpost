        stroke-linejoin="round"
        stroke-width="24" />

  <text x="438" y="246" fill="#f9fafb" font-family="ui-sans-serif, system-ui, sans-serif" font-size="82" font-weight="800">
    OpenPost
  </text>
  <text x="438" y="318" fill="#d1d5db" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="500">
    Self-hosted social media scheduling.
  </text>
  <text x="438" y="382" fill="#9ca3af" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28">
    X, Mastodon, Bluesky, Threads, and LinkedIn from your own server.
  </text>
