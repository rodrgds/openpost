name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Set up devenv cache
        uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        shell: bash
        run: nix profile add nixpkgs#devenv

      - name: Run devenv test (hooks + environment)
        run: devenv test

      - name: Run golangci-lint
        shell: devenv shell bash -- -e {0}
        run: |
          mkdir -p backend/cmd/openpost/public
          touch backend/cmd/openpost/public/.gitkeep
          cd backend && golangci-lint run ./...

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Set up devenv cache
        uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        shell: bash
        run: nix profile add nixpkgs#devenv

      - name: Create placeholder for embed
        shell: bash
        run: mkdir -p backend/cmd/openpost/public && touch backend/cmd/openpost/public/.gitkeep

      - name: Run backend tests
        shell: devenv shell bash -- -e {0}
        run: |
          cd backend
          go mod download
          go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.out
          fail_ci_if_error: false

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Set up devenv cache
        uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        shell: bash
        run: nix profile add nixpkgs#devenv

      - name: Install frontend dependencies
        shell: devenv shell bash -- -e {0}
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: Run frontend type checking
        shell: devenv shell bash -- -e {0}
        run: |
          cd frontend
          bun run check

      - name: Run frontend tests
        shell: devenv shell bash -- -e {0}
        run: |
          cd frontend
          bun run test

      - name: Build frontend
        shell: devenv shell bash -- -e {0}
        run: |
          cd frontend
          bun run build
